
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menú Principal</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      background-image: url("fondo1.jpg");
      background-size: cover;
      background-position: center;

      position: relative;
    }

    body::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.55); 
      backdrop-filter: blur(2px);
      z-index: 0;
    }

    .container {
      z-index: 1;
      text-align: center;
      width: 90%;
      max-width: 500px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 25px;
      margin: 20px 0;
      background: #ff6b00;
      border-radius: 20px;
      font-size: 2rem;
      font-weight: bold;
      text-decoration: none;
      color: white;
      box-shadow: 0 6px 15px rgba(0,0,0,0.4);
      transition: 0.15s;
    }
 .volver {
      margin-top: 25px;
      background: #1900ff !important;
    }

    .btn:hover { background: #ff8a3a; }
    .btn:active { transform: scale(0.97); }
  </style>
</head>
body>

    <a href="https://sites.google.com/view/comercio-2/p%C3%A1gina-principal" class="btn">Información</a>

     <a href="joaco2812.github.io" class="btn volver">Volver</a>
  </div>
</body>
</html>
